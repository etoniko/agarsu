<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="minimal-ui, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Eat cells smaller than you and don't get eaten by the bigger ones, as an MMO">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>Beta</title>
    <link id="favicon" rel="icon" type="image/png" href="assets/img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="./css/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.2.2/browser/pixi.min.js" integrity="sha512-JXgRCwQo7D72mCx/XI+Xb0JjgZiyKKjftJJBH45wWSXNWda/VjvU3NHfkUlItCH26enFd5JRlPtkNqPmvyXw3Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
    <div id="overlay" class="overlay">
        <div id="user-interface" class="main-container center">
            <div class="panel anim glass">
                <div class="title">Beta</div>
                <p class="panel-subtitle">Minimal client</p>

                <div class="panel-body">
                    <div class="panel-profile">
                        <div id="skin" class="button button--skin center round" title="Skins">
                            <span class="material-symbols-outlined skin-fallback">palette</span>
                        </div>
                        <div class="panel-inputs">
                            <input type="text" id="name" placeholder="Nickname" maxlength="16" autocomplete="username">
                            <input type="password" id="pass" placeholder="Pass" maxlength="8" autocomplete="current-password" class="panel-pass-input" style="display:none">
                        </div>
                    </div>

                    <div class="panel-actions">
                        <div id="play" class="button button--primary center">
                            <span class="material-symbols-outlined">play_arrow</span>
                            <span>Play</span>
                        </div>
                        <div id="spectate" class="button button--ghost center">
                            <span class="material-symbols-outlined">visibility</span>
                            <span>Spectate</span>
                        </div>
                    </div>

                    <div class="panel-footer">
                        <div id="settings" class="panel-footer-btn center" title="Settings">
                            <span class="material-symbols-outlined">tune</span>
                            <span>Settings</span>
                        </div>
                        <div id="servers" class="panel-footer-btn center" title="Servers">
                            <span class="material-symbols-outlined">public</span>
                            <span>Servers</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <aside id="stats" class="stats glass">
            <div class="stat"><span class="material-symbols-outlined">speed</span><span id="fps">FPS</span></div>
            <div class="stat"><span class="material-symbols-outlined">dns</span><span id="server">Server</span></div>
            <div class="stat"><span class="material-symbols-outlined">leaderboard</span><span id="score">Score</span></div>
            <div class="stat"><span class="material-symbols-outlined">network_ping</span><span id="ping">Ping</span></div>
            <div id="minion-controlled" class="stat stat--hidden"><span class="material-symbols-outlined">smart_toy</span><span>Minion</span></div>
        </aside>

        <aside id="leaderboard" class="leaderboard glass"></aside>

        <section id="chat" class="chat glass">
            <div id="chat-content" class="chat-content"></div>
            <div class="chat-field">
                <span class="material-symbols-outlined chat-icon">chat</span>
                <input id="chat-field" type="text" placeholder="Message…" class="chat-input">
            </div>
        </section>

        <aside id="minimap" class="minimap glass">
            <canvas id="minimap-view" width="170" height="170" class="minimap-canvas"></canvas>
            <div id="minimap-coords" class="minimap-coords">—</div>
        </aside>
    </div>

    <canvas id="view"></canvas>

    <div id="modals-container"></div>

    <div id="connect-verify-overlay" style="display:none;">
        <div id="connect-verify">
            <span class="material-symbols-outlined connect-verify-icon">shield</span>
            <div id="connect-verify-title">Проверка безопасности</div>
            <div id="connect-verify-text">Подождите, идёт подключение к серверу…</div>
            <div class="connect-verify-transfer" id="connect-verify-transfer">
                <div class="connect-verify-data-stream" id="connect-verify-data-stream">sha256("…") → …</div>
            </div>
        </div>
    </div>

    <script src="./js/main.js" type="module"></script>
</body>
</html>
