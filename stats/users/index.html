<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — Agar.su</title>
  <style>
    :root {
      --bg: #0f1118; --panel: #1a1d28; --panel2: #222633; --text: #e8ecf4;
      --muted: #8b93a7; --accent: #5b8cff; --border: #2d3345; --gold: #ffd54f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #1a2240 0%, var(--bg) 55%);
      color: var(--text); min-height: 100vh;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; margin-bottom: 18px;
    }
    .card h2 {
      margin: 0; padding: 16px 18px; background: var(--panel2);
      border-bottom: 1px solid var(--border); font-size: 1rem;
    }
    .card-body { padding: 16px 18px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; }
    .pts { color: var(--accent); font-weight: 700; }
    .muted { color: var(--muted); }
    .err {
      color: #ffcdd2; background: rgba(239,83,80,.12);
      border: 1px solid rgba(239,83,80,.35); padding: 12px; border-radius: 10px;
    }
    .profile-head { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 8px; }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%; border: 2px solid var(--border);
      object-fit: cover; flex-shrink: 0; background: var(--panel2);
    }
    .profile-nick { font-size: 1.4rem; font-weight: 700; color: var(--gold); }
    .btn {
      padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--panel2); color: var(--text); cursor: pointer; font-size: 0.9rem;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.ok { border-color: #4caf50; color: #a5d6a7; }
    .srv-link { color: var(--text); text-decoration: none; }
    .srv-link:hover { color: var(--accent); text-decoration: none; }
    a.back { color: var(--muted); text-decoration: none; font-size: 0.95rem; display: inline-block; margin-bottom: 16px; }
    a.back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../" class="back">← Глобальный рейтинг</a>
    <div id="head"><h1>Профиль</h1></div>
    <p class="muted" id="subNote">Данные обновляются каждые 5 минут.</p>
    <div id="content"><p class="muted">Загрузка…</p></div>
  </div>

  <script src="../config.js"></script>
  <script src="../skins.js"></script>
  <script>
    const API = window.STATS_API || "https://api.agar.su:6009";
    const REFRESH_MS = window.STATS_REFRESH_MS || 300000;
    const { loadSkins, resolveAvatar } = window.statsSkins;
    const serverUrl = window.statsServerUrl;

    function esc(s) {
      return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function serverCell(sid, name) {
      const label = esc(name || sid);
      if (!sid || !serverUrl) return label;
      return `<a href="${esc(serverUrl(sid))}" class="srv-link">${label}</a>`;
    }

    function currentProfileLink(id) {
      return window.statsProfileUrl(id);
    }

    async function copyLink(id) {
      const url = currentProfileLink(id);
      try {
        await navigator.clipboard.writeText(url);
        const btn = document.getElementById("copyBtn");
        if (btn) { btn.textContent = "Скопировано!"; btn.classList.add("ok"); setTimeout(() => { btn.textContent = "Копировать ссылку"; btn.classList.remove("ok"); }, 2000); }
      } catch {
        prompt("Скопируйте ссылку:", url);
      }
    }

    function render(stats) {
      const id = stats.id || stats.uid;
      const nick = stats.nick || (stats.nicks && stats.nicks[0]) || "—";
      const ava = resolveAvatar(stats) || resolveAvatar({ nick });
      document.title = nick + " — Agar.su";

      document.getElementById("head").innerHTML = "";
      const head = document.getElementById("head");
      head.innerHTML = `
        <div class="profile-head">
          <img class="avatar" src="${esc(ava)}" alt="">
          <div>
            <div class="profile-nick">${esc(nick)}</div>
          </div>
          <button class="btn" id="copyBtn" type="button">Копировать ссылку</button>
        </div>`;
      document.getElementById("copyBtn").onclick = () => copyLink(id);

      const recs = Object.values(stats.records || {}).sort((a, b) => (b.score || 0) - (a.score || 0));
      let html = `<div class="card"><h2>Статистика</h2><div class="card-body">`;
      html += `<p><strong>Всего очков:</strong> <span class="pts">${Number(stats.points) || 0}</span></p>`;
      html += `<p><strong>Лучший рекорд:</strong> ${Number(stats.bestScore) || 0}</p></div></div>`;

      if (stats.lastPoll && stats.lastPoll.servers) {
        const rows = Object.entries(stats.lastPoll.servers);
        if (rows.length) {
          html += `<div class="card"><h2>Последнее обновление</h2><div class="card-body"><table>
            <thead><tr><th>Сервер</th><th>Место</th><th>Рекорд</th><th>Очки</th></tr></thead><tbody>`;
          rows.forEach(([sid, r]) => {
            html += `<tr><td>${serverCell(sid, r.serverName || sid)}</td><td>${r.rank || "—"}</td>
              <td class="pts">${r.score || 0}</td><td>${r.points || 0}</td></tr>`;
          });
          html += "</tbody></table></div></div>";
        }
      }

      html += `<div class="card"><h2>Рекорды по серверам</h2><div class="card-body">`;
      if (!recs.length) {
        html += '<p class="muted">Рекорды появятся, когда игрок попадёт в топ.</p>';
      } else {
        html += '<table><thead><tr><th>Сервер</th><th>Рекорд</th><th>Ник</th><th>Место</th></tr></thead><tbody>';
        recs.forEach((r) => {
          html += `<tr><td>${serverCell(r.serverId, r.serverName || r.serverId)}</td><td class="pts">${r.score || 0}</td>
            <td>${esc(r.nick)}</td><td>${r.rank || "—"}</td></tr>`;
        });
        html += "</tbody></table>";
      }
      html += "</div></div>";
      return html;
    }

    async function load(id, forceSkins) {
      const box = document.getElementById("content");
      if (!box.dataset.loaded) box.innerHTML = '<p class="muted">Загрузка…</p>';
      history.replaceState(null, "", "?id=" + encodeURIComponent(id));
      try {
        await loadSkins(forceSkins);
        const res = await fetch(API + "/api/user/" + encodeURIComponent(id), { cache: "no-store" });
        if (!res.ok) throw new Error(res.status === 404 ? "Профиль не найден" : "HTTP " + res.status);
        box.innerHTML = render(await res.json());
        box.dataset.loaded = "1";
      } catch (e) {
        box.innerHTML = '<div class="err">' + esc(e.message) + '</div>';
      }
    }

    const qId = new URLSearchParams(location.search).get("id");
    if (qId) {
      load(qId, true);
      setInterval(() => load(qId, false), REFRESH_MS);
    } else {
      document.getElementById("content").innerHTML = '<div class="err">Укажите id: users/?id=8</div>';
    }
  </script>
</body>
</html>
