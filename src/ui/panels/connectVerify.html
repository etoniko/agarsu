<div id="connect-verify-overlay" class="inl-13">
    <div id="connect-verify">
      <i id="connect-verify-icon" class="fas fa-shield-halved connect-verify-icon" aria-hidden="true"></i>
      <div id="connect-verify-title">Проверка безопасности</div>
      <div id="connect-verify-text">Подождите, идёт подключение к серверу…</div>
      <div class="connect-verify-transfer" id="connect-verify-transfer">
        <div class="connect-verify-node connect-verify-pc">
          <i class="fas fa-desktop"></i>
          <span>ПК</span>
        </div>
        <div class="connect-verify-link">
          <div class="connect-verify-packets" aria-hidden="true">
            <span class="connect-packet connect-packet-out"></span>
            <span class="connect-packet connect-packet-in"></span>
            <span class="connect-packet connect-packet-out connect-packet-delay"></span>
            <span class="connect-packet connect-packet-in connect-packet-delay"></span>
          </div>
          <div class="connect-verify-data-stream" id="connect-verify-data-stream">sha256("…") → …</div>
        </div>
        <div class="connect-verify-node connect-verify-server">
          <i class="fas fa-server"></i>
          <span>Сервер</span>
        </div>
      </div>
      <div id="connect-verify-reconnect" hidden>
        <button type="button" id="connect-verify-reconnect-btn" class="connect-verify-reconnect-btn">Переподключиться</button>
      </div>
    </div>
  </div>
