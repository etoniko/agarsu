          <div class="top-info">
            <div><span>Настройки</span></div>
          </div>
          <div class="settings-layout">
            <nav class="settings-nav" aria-label="Разделы настроек">
              <div class="settings-nav-scroll">
                <button type="button" class="settings-nav-item active" data-panel="graphics">
                  <i class="fas fa-palette"></i><span>Графика</span>
                </button>
                <button type="button" class="settings-nav-item" data-panel="backgrounds">
                  <i class="fas fa-image"></i><span>Фоны</span>
                </button>
                <button type="button" class="settings-nav-item" data-panel="colors">
                  <i class="fas fa-droplet"></i><span>Цвета</span>
                </button>
                <button type="button" class="settings-nav-item" data-panel="controls">
                  <i class="fas fa-keyboard"></i><span>Управление</span>
                </button>
                <button type="button" class="settings-nav-item" data-panel="system">
                  <i class="fas fa-sliders"></i><span>Прочее</span>
                </button>
              </div>
            </nav>
            <div class="settings-panels checkbox-container">
              <section class="settings-panel active" data-panel="graphics">
                <h3 class="settings-panel-title">Отображение в игре</h3>
                <label><input type="checkbox" class="save" data-box-id="1" onchange="setSkins(this.checked);">Видеть скины</label>
                <label><input type="checkbox" class="save" data-box-id="2" onchange="setNames(this.checked);">Видеть имена</label>
                <label><input type="checkbox" class="save" data-box-id="3" onchange="setColors(this.checked);">Цвета с сервера</label>
                <label><input type="checkbox" class="save" data-box-id="5" onchange="setShowMass(this.checked);" checked>Показать массу</label>
                <label><input type="checkbox" class="save" data-box-id="6" onchange="setSmooth(this.checked);">Простой рендер</label>
                <label><input type="checkbox" class="save" data-box-id="7" onchange="setNoBorder(this.checked);">Отключить обводку</label>
                <label><input type="checkbox" class="save" data-box-id="9" onchange="setGlow(this.checked);" checked>Эффект лимита</label>
                <label><input type="checkbox" class="save" data-box-id="12" onchange="setFixedCell(this.checked);">Фиксированная клетка</label>
                <label><input type="checkbox" class="save" data-box-id="13" onchange="setShowStickers(this.checked);">Показывать стикеры</label>
              </section>
              <section class="settings-panel" data-panel="backgrounds">
                <h3 class="settings-panel-title">Фон карты</h3>
                <div id="theme-selector" class="settings-field">
                  <label for="theme-select">Тема поля:</label>
                  <select id="theme-select">
                    <option value="gradient">Градиент</option>
                    <option value="white">Белая</option>
                    <option value="black">Чёрная</option>
                  </select>
                </div>
                <div id="gradient-settings">
                  <div class="color-picker">
                    <span>Цвет центра:</span>
                    <input type="color" id="gradient-center" value="#132745">
                  </div>
                  <div class="color-picker">
                    <span>Цвет краёв:</span>
                    <input type="color" id="gradient-edge" value="#000000">
                  </div>
                </div>
                <div id="custom-bg-settings" class="settings-subsection">
                  <label><input type="checkbox" class="save" data-box-id="15" onchange="setCustomMapBg(this.checked);">Свой фон карты (внутри границ сервера)</label>
                  <div class="custom-bg-block">
                    <div class="custom-bg-file-row">
                      <span class="custom-bg-file-label">Картинка</span>
                      <label class="custom-bg-file" for="map-bg-file">
                        <input type="file" id="map-bg-file" accept="image/*">
                        <span class="custom-bg-file-btn"><i class="fas fa-plus"></i> Добавить</span>
                      </label>
                      <button type="button" class="custom-bg-clear" id="map-bg-clear" hidden>Убрать</button>
                    </div>
                    <div class="custom-bg-row">
                      <span>Режим:</span>
                      <select id="map-bg-mode">
                        <option value="stretch">Растянуть на всю карту</option>
                        <option value="repeat">Плитка (повтор)</option>
                      </select>
                    </div>
                    <div class="custom-bg-row" id="map-bg-tile-row">
                      <span>Размер плитки:</span>
                      <input type="number" id="map-bg-tile" min="64" max="4096" value="512" step="64">
                    </div>
                    <div class="custom-bg-preview" id="map-bg-preview"></div>
                  </div>
                  <label><input type="checkbox" class="save" data-box-id="16" onchange="setCustomVirusBg(this.checked);">Своя картинка вместо цвета вируса</label>
                  <div class="custom-bg-block">
                    <div class="custom-bg-file-row">
                      <span class="custom-bg-file-label">Изображение вируса</span>
                      <label class="custom-bg-file" for="virus-bg-file">
                        <input type="file" id="virus-bg-file" accept="image/*">
                        <span class="custom-bg-file-btn"><i class="fas fa-plus"></i> Добавить</span>
                      </label>
                      <button type="button" class="custom-bg-clear" id="virus-bg-clear" hidden>Убрать</button>
                    </div>
                    <div class="custom-bg-preview" id="virus-bg-preview"></div>
                  </div>
                </div>
              </section>
              <section class="settings-panel" data-panel="colors">
                <h3 class="settings-panel-title">Свои цвета (только у вас)</h3>
                <label><input type="checkbox" class="save" data-box-id="14" onchange="setCustomClientColors(this.checked);">Включить свои цвета клеток</label>
                <div id="client-color-settings">
                  <div class="color-picker">
                    <span>Вирус:</span>
                    <input type="color" id="client-color-virus" value="#33ff33">
                  </div>
                  <div class="color-picker">
                    <span>Еда:</span>
                    <input type="color" id="client-color-food" value="#ffe066">
                  </div>
                  <div class="color-picker">
                    <span>Враги:</span>
                    <input type="color" id="client-color-enemy" value="#ff4444">
                  </div>
                  <div class="color-picker">
                    <span>Мои шары:</span>
                    <input type="color" id="client-color-own" value="#4488ff">
                  </div>
                  <div class="color-picker">
                    <span>Масса (W):</span>
                    <input type="color" id="client-color-eject" value="#ff66cc">
                  </div>
                </div>
              </section>
              <section class="settings-panel" data-panel="controls">
                <h3 class="settings-panel-title">Клавиши и мышь</h3>
                <label><input type="checkbox" class="save" data-box-id="4" onchange="setMouseClicks(this.checked);">Поддержка клика мышки</label>
                <div id="keybind-settings" class="custom-bg-block">
                  <div id="mouse-bind-settings" class="mouse-bind-in-keybind">
                    <div class="custom-bg-row">
                      <span>Разделение (мышь):</span>
                      <select id="mouse-split-btn">
                        <option value="1">Левая (ЛКМ)</option>
                        <option value="3">Правая (ПКМ)</option>
                        <option value="0">Отключено</option>
                      </select>
                    </div>
                    <div class="custom-bg-row">
                      <span>Выброс массы (мышь):</span>
                      <select id="mouse-eject-btn">
                        <option value="1">Левая (ЛКМ)</option>
                        <option value="3">Правая (ПКМ)</option>
                        <option value="0">Отключено</option>
                      </select>
                    </div>
                  </div>
                  <div id="keybind-list"></div>
                  <button type="button" id="keybind-reset" class="custom-bg-clear">Сбросить все клавиши</button>
                </div>
              </section>
              <section class="settings-panel" data-panel="system">
                <h3 class="settings-panel-title">Интерфейс и прочее</h3>
                <label><input type="checkbox" class="save" data-box-id="8" onchange="setChatHide(this.checked);">Отключить чат</label>
                <label><input type="checkbox" class="save" data-box-id="10" onchange="setAdultContent(this.checked);">+18 (убрать антимат и блюр)</label>
                <label><input type="checkbox" class="save" data-box-id="11" onchange="setConfirmCloseTab(this.checked);">Подтверждение выхода из игры</label>
              </section>
            </div>
          </div>
